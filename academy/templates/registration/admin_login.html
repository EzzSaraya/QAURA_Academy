{% extends 'academy/base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card table-card p-4 mt-5">
            <div class="text-center mb-4">
                <img src="{% static 'img/qaura-logo.png' %}" class="login-logo mb-3" alt="QAURA Academy logo">
                <h3 class="mt-2">Admin Login</h3>
                <p class="text-muted mb-0">Owner / administration access</p>
            </div>
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required autofocus>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button class="btn btn-qaura w-100">Login as Admin</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
