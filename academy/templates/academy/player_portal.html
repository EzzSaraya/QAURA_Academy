{% extends 'academy/base.html' %}
{% load static %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
        <div class="card table-card border-0 p-4 p-md-5 mt-5 text-center">
            <img src="{% static 'img/qaura-logo.png' %}" class="login-logo mx-auto mb-4" alt="QAURA Academy logo">

            <h2 class="fw-bold mb-2">Player Login</h2>
            <p class="text-muted mb-4">
                Enter your numeric player code to check your remaining sessions and weekly plan dates.
            </p>

            <a href="{% url 'player_login' %}" class="btn btn-qaura w-100 py-3 fw-semibold">
                Login with Player Code
            </a>

            <div class="alert alert-light border mt-4 mb-0 text-start">
                Player accounts and codes are created by the academy admin.
            </div>
        </div>
    </div>
</div>
{% endblock %}
