{% extends 'academy/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card table-card p-4">
            <h4>Delete Player</h4>
            <p class="text-muted">Are you sure you want to delete <strong>{{ player.name }}</strong>?</p>
            <form method="post" class="d-flex justify-content-end gap-2">
                {% csrf_token %}
                <a href="{% url 'add_sessions_list' %}" class="btn btn-outline-secondary">Cancel</a>
                <button class="btn btn-danger">Delete</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
